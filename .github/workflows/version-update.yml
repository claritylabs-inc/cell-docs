name: Update Cell Version & Generate Docs

on:
  repository_dispatch:
    types: [cell-version-published]
  workflow_dispatch:
    inputs:
      version:
        description: "Cell version (e.g. 0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: claritylabs-inc

      - name: Parse version
        id: semver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          BRANCH="v${MAJOR}.${MINOR}"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # Determine if this is a major bump by checking if previous major.minor branch exists
          git ls-remote --heads origin | grep -q "refs/heads/v$((MAJOR-1))." && IS_MAJOR=true || IS_MAJOR=false
          # More accurate: check if minor is 0 and patch is 0 and major > 0
          if [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ] && [ "$MAJOR" != "0" ]; then
            IS_MAJOR=true
          fi
          echo "is_major=$IS_MAJOR" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Branch: $BRANCH, Major: $IS_MAJOR"

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Save old type definitions
        run: |
          OLD_TYPES="/tmp/old-types.d.ts"
          if [ -f "node_modules/@claritylabs-inc/cell/dist/index.d.ts" ]; then
            cp node_modules/@claritylabs-inc/cell/dist/index.d.ts "$OLD_TYPES"
          else
            npm ci
            cp node_modules/@claritylabs-inc/cell/dist/index.d.ts "$OLD_TYPES"
          fi
          echo "old_types=$OLD_TYPES" >> $GITHUB_ENV
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Install new cell version
        run: |
          npm install @claritylabs-inc/cell@${{ steps.semver.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Commit dependency update on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: update @claritylabs-inc/cell to v${{ steps.semver.outputs.version }}" || echo "No changes to commit"

      - name: Create or update version branch
        run: |
          BRANCH="${{ steps.semver.outputs.branch }}"
          if git ls-remote --heads origin | grep -q "refs/heads/$BRANCH"; then
            git checkout "$BRANCH"
            git merge main --no-edit
          else
            git checkout -b "$BRANCH"
          fi

      - name: Run AI doc generation
        run: |
          MAJOR_FLAG=""
          if [ "${{ steps.semver.outputs.is_major }}" = "true" ]; then
            MAJOR_FLAG="--major"
          fi
          npx tsx scripts/generate-docs.ts \
            --version ${{ steps.semver.outputs.version }} \
            --old-types "$old_types" \
            $MAJOR_FLAG
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit generated docs
        run: |
          git add content/docs/
          git commit -m "docs: auto-generate docs for v${{ steps.semver.outputs.version }}" || echo "No doc changes"

      - name: Update versions config
        run: |
          # Collect all version branches
          BRANCHES=$(git branch -r --list 'origin/v*' | sed 's|origin/||' | sort -V)
          CURRENT="${{ steps.semver.outputs.version }}"
          BASE_URL="\${process.env.NEXT_PUBLIC_DOCS_BASE_URL ?? \"https://cell.claritylabs.inc/docs\"}"

          # Generate lib/versions.ts
          cat > lib/versions.ts << 'TSEOF'
          export const CURRENT_VERSION = process.env.CELL_VERSION ?? "0.0.0";

          const BASE_URL =
            process.env.NEXT_PUBLIC_DOCS_BASE_URL ?? "https://cell.claritylabs.inc/docs";

          export const versions = [
            {
              version: CURRENT_VERSION,
              label: `v${CURRENT_VERSION} (latest)`,
              url: `${BASE_URL}/v${CURRENT_VERSION}`,
            },
          TSEOF

          for BRANCH in $BRANCHES; do
            VER=$(echo "$BRANCH" | sed 's/v//')
            cat >> lib/versions.ts << ENTRY
            {
              version: "${VER}",
              label: "v${VER}",
              url: \`\${BASE_URL}/v${VER}\`,
            },
          ENTRY
          done

          echo "];" >> lib/versions.ts

          git add lib/versions.ts
          git commit -m "chore: sync version config for v${{ steps.semver.outputs.version }}" || echo "No version changes"

      - name: Generate vercel.json rewrites
        run: |
          BRANCHES=$(git branch -r --list 'origin/v*' | sed 's|origin/||' | sort -V)

          echo '{' > vercel.json
          echo '  "rewrites": [' >> vercel.json

          FIRST=true
          for BRANCH in $BRANCHES; do
            SLUG=$(echo "$BRANCH" | tr '.' '')
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo ',' >> vercel.json
            fi
            printf '    { "source": "/docs/%s/:path*", "destination": "https://docs-git-%s-claritylabs.vercel.app/docs/:path*" }' "$BRANCH" "$SLUG" >> vercel.json
          done

          echo '' >> vercel.json
          echo '  ]' >> vercel.json
          echo '}' >> vercel.json

          git add vercel.json
          git commit -m "chore: sync vercel rewrites for v${{ steps.semver.outputs.version }}" || echo "No rewrite changes"

      - name: Push version branch
        run: |
          git push origin ${{ steps.semver.outputs.branch }}

      - name: Push main
        run: |
          git checkout main
          git push origin main
